<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: commonHead('Employee Detail')}"><title>Employee Detail</title></head>
<body>

<nav th:replace="~{fragments/layout :: topnav('employees')}"></nav>
<div th:replace="~{fragments/layout :: breadcrumb('Employees / Detail')}"></div>

<div class="page-content" th:if="${emp != null}"
     th:data-flash="${flash}" th:data-flash-type="${flashType}">

  <div class="pg-header">
    <div class="pg-header-icon">👤</div>
    <div>
      <div class="pg-header-title" th:text="${emp.fullName}">Employee</div>
      <div class="pg-header-sub"># <span th:text="${emp.employeeNumber}"></span></div>
    </div>
    <div class="pg-header-badge">M2</div>
  </div>

  <div class="pg-topbar">
    <span class="pg-topbar-title" th:text="${emp.jobTitle}">Title</span>
    <div class="pg-topbar-actions">
      <a href="/employees" class="btn btn-sm">← Back to List</a>
      <a th:href="@{/employees/{no}/edit(no=${emp.employeeNumber})}" class="btn btn-warn">✏ Edit</a>
<!--      <form id="del-form" th:action="@{/employees/{no}/delete(no=${emp.employeeNumber})}" method="post" style="display:inline">-->
<!--        <button type="button" class="btn btn-danger del-btn"-->
<!--                data-form-id="del-form"-->
<!--                th:attr="data-entity-name=${emp.fullName}">-->
<!--          🗑 Delete-->
<!--        </button>-->
<!--      </form>-->
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <div class="tab-item on"  onclick="switchTab('etab','info',this)">Info</div>
    <div class="tab-item"     onclick="switchTab('etab','reports',this)">Direct Reports</div>
    <div class="tab-item"     onclick="switchTab('etab','customers',this)">Customers</div>
  </div>

  <!-- Info tab -->
  <div class="tab-panel on" id="etab-info">
    <div class="detail-grid">
      <div class="d-field"><div class="d-lbl">Employee #</div><div class="d-val" th:text="${emp.employeeNumber}"></div></div>
      <div class="d-field"><div class="d-lbl">First Name</div><div class="d-val" th:text="${emp.firstName}"></div></div>
      <div class="d-field"><div class="d-lbl">Last Name</div><div class="d-val" th:text="${emp.lastName}"></div></div>
      <div class="d-field"><div class="d-lbl">Job Title</div><div class="d-val" th:text="${emp.jobTitle}"></div></div>
      <div class="d-field"><div class="d-lbl">Email</div><div class="d-val" th:text="${emp.email}"></div></div>
      <div class="d-field"><div class="d-lbl">Extension</div><div class="d-val" th:text="${emp.extension}"></div></div>
      <div class="d-field"><div class="d-lbl">Office</div><div class="d-val" th:text="${emp.officeCity}"></div></div>
      <div class="d-field"><div class="d-lbl">Manager</div><div class="d-val" th:text="${emp.managerDisplay}"></div></div>
    </div>
  </div>

  <!-- Direct Reports tab -->
  <div class="tab-panel" id="etab-reports">
    <div class="table-wrap">
      <table class="wf-table">
        <thead><tr><th>#</th><th>Name</th><th>Title</th><th>Office</th><th>Actions</th></tr></thead>
        <tbody>
          <tr th:if="${reportees == null or reportees.isEmpty()}">
            <td colspan="5" style="text-align:center;padding:16px;color:#888">No direct reports.</td>
          </tr>
          <tr th:each="r : ${reportees}">
            <td th:text="${r.employeeNumber}"></td>
            <td th:text="${r.fullName}"></td>
            <td th:text="${r.jobTitle}"></td>
            <td th:text="${r.officeCity}"></td>
            <td><a th:href="@{/employees/{no}(no=${r.employeeNumber})}" class="btn btn-sm">View</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Customers tab -->
  <div class="tab-panel" id="etab-customers">
    <div class="table-wrap">
      <table class="wf-table">
        <thead><tr><th>#</th><th>Name</th><th>City</th><th>Country</th><th>Actions</th></tr></thead>
        <tbody>
          <tr th:if="${customers == null or customers.isEmpty()}">
            <td colspan="5" style="text-align:center;padding:16px;color:#888">No customers assigned.</td>
          </tr>
          <tr th:each="c : ${customers}">
            <td th:text="${c.customerNumber}"></td>
            <td th:text="${c.customerName}"></td>
            <td th:text="${c.city}"></td>
            <td th:text="${c.country}"></td>
            <td><a th:href="@{/customers/{no}(no=${c.customerNumber})}" class="btn btn-sm">View</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</body>
</html>
