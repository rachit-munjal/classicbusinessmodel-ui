<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: commonHead('Edit Product')}"><title>Edit Product</title></head>
<body>
<nav th:replace="~{fragments/layout :: topnav('products')}"></nav>
<div th:replace="~{fragments/layout :: breadcrumb('Products / Edit')}"></div>

<div class="page-content" th:data-flash="${flash}" th:data-flash-type="${flashType}">
  <div class="pg-header">
    <div class="pg-header-icon">✏️</div>
    <div><div class="pg-header-title" th:text="${prod.productName}">Edit Product</div></div>
    <div class="pg-header-badge">M5</div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:20px">
    <a th:href="@{/products/{code}(code=${prod.productCode})}" class="btn btn-sm">← Back to View</a>
    <a href="/products" class="btn btn-sm">All Products</a>
  </div>

  <div class="card">
    <div style="font-size:.7rem;font-weight:700;letter-spacing:.1em;color:#888;margin-bottom:16px;text-transform:uppercase">
      Product Code: <span th:text="${prod.productCode}" style="color:#222">S10_1678</span>
    </div>

    <form th:action="@{/products/{code}/update(code=${prod.productCode})}" method="post" class="wf-form">

      <!-- Product Name (display only) -->
      <div class="f-field" style="margin-bottom:18px">
        <label class="f-lbl">Product Name</label>
        <input class="f-input" th:value="${prod.productName}" disabled style="background:#f5f5f5;color:#555"/>
      </div>

      <!-- Product Line (display only) -->
      <div class="f-row2">
        <div class="f-field">
          <label class="f-lbl">Product Line</label>
          <input class="f-input" th:value="${prod.productLineName}" disabled style="background:#f5f5f5;color:#555"/>
        </div>
        <div class="f-field">
          <label class="f-lbl">Scale</label>
          <input class="f-input" th:value="${prod.productScale}" disabled style="background:#f5f5f5;color:#555"/>
        </div>
      </div>

      <hr style="margin:20px 0;border:none;border-top:1px solid #eee"/>
      <div style="font-size:.75rem;font-weight:700;letter-spacing:.08em;color:#666;text-transform:uppercase;margin-bottom:14px">
        Editable Fields
      </div>

      <!-- Editable: Buy Price, Qty, MSRP -->
      <div class="f-row2">
        <div class="f-field">
          <label class="f-lbl">Buy Price ($)</label>
          <input class="f-input" name="buyPrice" type="number" step="0.01" min="0"
                 th:value="${prod.buyPrice}" placeholder="e.g. 48.81"/>
        </div>
        <div class="f-field">
          <label class="f-lbl">MSRP ($)</label>
          <input class="f-input" name="msrp" type="number" step="0.01" min="0"
                 th:value="${prod.msrp}" placeholder="e.g. 95.70"/>
        </div>
      </div>

      <div class="f-row2">
        <div class="f-field">
          <label class="f-lbl">Quantity in Stock</label>
          <input class="f-input" name="qty" type="number" min="0"
                 th:value="${prod.quantityInStock}" placeholder="e.g. 7933"/>
        </div>
        <div class="f-field" style="display:flex;align-items:flex-end">
          <div style="font-size:.78rem;color:#888;padding-bottom:4px">
            Leave a field blank to keep the current value unchanged.
          </div>
        </div>
      </div>

      <div class="f-actions">
        <button type="submit" class="btn btn-dark">Save Changes</button>
        <a th:href="@{/products/{code}(code=${prod.productCode})}" class="btn">Cancel</a>
      </div>
    </form>
  </div>

  <!-- Current values reference -->
  <div class="card" style="margin-top:16px">
    <div style="font-size:.7rem;font-weight:700;letter-spacing:.1em;color:#888;margin-bottom:12px;text-transform:uppercase">
      Current Values
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
      <div class="stat-box">
        <div class="stat-lbl">Buy Price</div>
        <div class="stat-val stat-val-sm" th:text="${prod.formattedBuyPrice}">$48.81</div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">MSRP</div>
        <div class="stat-val stat-val-sm" th:text="${prod.formattedMsrp}">$95.70</div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">Qty in Stock</div>
        <div class="stat-val" th:text="${prod.quantityInStock}">7933</div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">Vendor</div>
        <div class="stat-val stat-val-sm" th:text="${prod.productVendor}">—</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
