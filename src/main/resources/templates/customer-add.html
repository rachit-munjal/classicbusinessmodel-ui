<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: commonHead('Add Customer')}"><title>Add Customer</title></head>
<body>
<nav th:replace="~{fragments/layout :: topnav('customers')}"></nav>
<div th:replace="~{fragments/layout :: breadcrumb('Customers / Add')}"></div>

<div class="page-content" th:data-flash="${flash}" th:data-flash-type="${flashType}">
  <div class="pg-header">
    <div class="pg-header-icon">➕</div>
    <div class="pg-header-title">Add Customer</div>
<!--      <div class="pg-header-sub">POST /api/v1/customers/add</div>-->
  </div>
  <a href="/customers" class="back-link">← Back to Customer List</a>

  <div class="card">
    <form method="post" action="/customers/add" class="wf-form">
      <div class="f-row2">
        <div class="f-field">
          <label class="f-lbl">Customer Name <span class="req">*</span></label>
          <input class="f-input" name="customerName" placeholder="Company name" required/>
        </div>
        <div class="f-field">
          <label class="f-lbl">Phone <span class="req">*</span></label>
          <input class="f-input" name="phone" placeholder="+1 555 0000" required/>
        </div>
      </div>
      <div class="f-row2">
        <div class="f-field">
          <label class="f-lbl">Contact First Name</label>
          <input class="f-input" name="contactFirstName" placeholder="First"/>
        </div>
        <div class="f-field">
          <label class="f-lbl">Contact Last Name</label>
          <input class="f-input" name="contactLastName" placeholder="Last"/>
        </div>
      </div>
      <div class="f-row2">
        <div class="f-field">
          <label class="f-lbl">Address Line 1</label>
          <input class="f-input" name="addressLine1" placeholder="Street address"/>
        </div>
        <div class="f-field">
          <label class="f-lbl">City <span class="req">*</span></label>
          <input class="f-input" name="city" placeholder="City" required/>
        </div>
      </div>
      <div class="f-row2">
        <div class="f-field">
          <label class="f-lbl">Country <span class="req">*</span></label>
          <input class="f-input" name="country" placeholder="Country" required/>
        </div>
        <div class="f-field">
          <label class="f-lbl">Credit Limit</label>
          <input class="f-input" name="creditLimit" type="number" step="0.01" placeholder="0.00"/>
        </div>
      </div>
      <div class="f-field">
        <label class="f-lbl">Sales Rep Employee #</label>
        <select class="f-select" name="salesRepEmployeeNumber">
          <option value="">— Select employee —</option>
          <option th:each="e : ${employees}"
                  th:value="${e.employeeNumber}"
                  th:text="${e.employeeNumber + ' — ' + e.fullName}"></option>
        </select>
      </div>
      <div class="f-actions">
        <button type="submit" class="btn btn-dark">Save Customer</button>
        <a href="/customers" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
