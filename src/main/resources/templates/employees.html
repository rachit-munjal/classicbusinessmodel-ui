<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: commonHead('Employees')}"><title>Employees</title></head>
<body>

<nav th:replace="~{fragments/layout :: topnav('employees')}"></nav>
<div th:replace="~{fragments/layout :: breadcrumb('Employees')}"></div>

<div class="page-content" th:data-flash="${flash}" th:data-flash-type="${flashType}">

  <div class="pg-header">
    <div><div class="pg-header-title">Employees</div></div>
<!--    <div class="pg-header-badge">M2</div>-->
  </div>

<!--  <div class="ep-strip">-->
<!--    <span class="ep ep-get">GET /api/v1/employees/search [SECURED]</span>-->
<!--    <span class="ep ep-post">POST /api/v1/employees/add</span>-->
<!--    <span class="ep ep-put">PUT /api/v1/employees/update/{no}</span>-->
<!--    <span class="ep ep-del">DELETE /api/v1/employees/delete/{no}</span>-->
<!--  </div>-->

  <div class="pg-topbar">
    <span class="pg-topbar-title">All Employees</span>
    <div class="pg-topbar-actions">
      <a href="/" class="btn btn-sm">← Dashboard</a>
      <a href="/employees/add" class="btn btn-dark">+ Add Employee</a>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-lbl">Total</div>
      <div class="stat-val" th:text="${stats['totalEmployees'] ?: employees.totalElements}">23</div>
    </div>
    <div class="stat-box">
      <div class="stat-lbl">Offices</div>
      <div class="stat-val" th:text="${stats['totalOffices'] ?: 0}">7</div>
    </div>
  </div>

  <form method="get" action="/employees" class="search-row">
    <input id="employee-search" type="text" name="search"
           class="f-input" placeholder="Search name, city…"
           th:value="${search}" style="max-width:240px"/>
    <select id="employee-office-filter" name="office" class="f-select" style="min-width:140px">
      <option value="" th:selected="${selectedOffice == ''}">All Offices</option>
      <option th:each="o : ${offices}"
              th:value="${o.officeCode}"
              th:text="${o.city}"
              th:selected="${o.officeCode == selectedOffice}">City</option>
    </select>
    <button type="submit" class="btn">Search</button>
    <a href="/employees" class="btn"
       th:if="${!search.blank || !selectedOffice.blank}">Clear</a>
  </form>

  <div class="page-meta"
       th:text="'Showing ' + ${employees.content.size()} + ' of ' + ${employees.totalElements} + ' employees'"></div>

  <div th:if="${employees.content.isEmpty()}" class="empty-state">
    <div class="empty-icon">👤</div>
    <div>No employees found.</div>
  </div>

  <div th:unless="${employees.content.isEmpty()}" class="table-wrap">
    <table id="employees-table" class="wf-table">
      <thead>
        <tr>
          <th>Emp #</th>
          <th>Name</th>
          <th>Title</th>
          <th>Office</th>
          <th>Reports To</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="emp : ${employees.content}">
          <td th:text="${emp.employeeNumber}">1002</td>
          <td th:text="${emp.fullName}">Diane Murphy</td>
          <td th:text="${emp.jobTitle}">President</td>
          <td th:text="${emp.officeCity}">San Francisco</td>
          <td th:text="${emp.managerDisplay}">—</td>
          <td class="actions-cell">
            <a th:href="@{/employees/{no}(no=${emp.employeeNumber})}" class="btn btn-sm">View</a>
            <a th:href="@{/employees/{no}/edit(no=${emp.employeeNumber})}" class="btn btn-warn btn-sm">Edit</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" th:if="${employees.totalPages > 1}">
    <a th:href="@{/employees(page=${employees.previousPage}, search=${search}, office=${selectedOffice})}"
       th:class="${employees.first ? 'pag-btn disabled' : 'pag-btn'}">←</a>
    <a th:each="i : ${employees.pageRange}"
       th:href="@{/employees(page=${i}, search=${search}, office=${selectedOffice})}"
       th:text="${i + 1}"
       th:class="${i == employees.number ? 'pag-btn on' : 'pag-btn'}">1</a>
    <a th:href="@{/employees(page=${employees.nextPage}, search=${search}, office=${selectedOffice})}"
       th:class="${employees.last ? 'pag-btn disabled' : 'pag-btn'}">→</a>
  </div>

</div>
</body>
</html>
